services:
  app:
    image: bank_analysis_backend:${IMAGE_TAG}
    build:
      context: .
    restart: unless-stopped
    ports:
      - "8000:${APP_PORT}"
    environment:
      SELENIUM_REMOTE_URL: "http://selenium:4444"
      APP_USER_DATA_DIR: ${APP_USER_DATA_DIR}
      LOCAL_DOWNLOADS_DIR: ${LOCAL_DOWNLOADS_DIR}
      REMOTE_DOWNLOADS_DIR: ${SELENIUM_DOWNLOADS_DIR}
      APP_JOB_HOUR: "18"
      APP_JOB_MINUTE: "0"
    depends_on:
      selenium:
        condition: service_healthy
    volumes:
      - user_data:${APP_USER_DATA_DIR}}
      - downloads:${LOCAL_DOWNLOADS_DIR}

    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/ || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3

  selenium:
    image: selenium/standalone-edge:144.0-20260202 # pin to a stable release you tested
    restart: unless-stopped
    shm_size: "2g"
    ports:
      - "4444:4444"
    volumes:
      - downloads:${SELENIUM_DOWNLOADS_DIR}
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:4444/status || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
    environment:
        LOG_LEVEL: "INFO"
    deploy:
      resources:
        limits:
          memory: 2g

volumes:
  user_data:
  downloads: