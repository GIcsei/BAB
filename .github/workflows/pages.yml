name: Deploy Docs to GitHub Pages

on:
  push:
    branches: [main]
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  download-artifacts:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@latest

      - name: Download security artifacts from release job
        uses: actions/download-artifact@latest
        with:
          path: artifacts/
        continue-on-error: true  # Don't fail if no artifacts on main branch

      - name: List downloaded artifacts
        run: |
          echo "=== Downloaded Artifacts ==="
          find artifacts/ -type f -name "*.json" 2>/dev/null | head -20 || echo "No JSON artifacts found"

  build:
    runs-on: ubuntu-latest
    needs: [download-artifacts]
    steps:
      - name: Checkout
        uses: actions/checkout@latest

      - name: Set up Python
        uses: actions/setup-python@latest
        with:
          python-version: "3.12"

      - name: Install MkDocs and dependencies
        run: |
          pip install mkdocs-material jinja2

      - name: Download artifacts
        uses: actions/download-artifact@latest
        with:
          path: security-artifacts/
        continue-on-error: true

      - name: Generate security reports
        run: |
          mkdir -p site/reports/security/latest
          if [ -d security-artifacts ]; then
            # Find and consolidate JSON files from various artifact folders
            find security-artifacts -name "*.json" -type f | while read file; do
              echo "Processing: $file"
              cp "$file" "security-artifacts/$(basename $file)"
            done
          fi
          python scripts/generate-security-reports.py \
            --input-dir security-artifacts/ \
            --output-dir site/reports/security/latest/ || echo "No security reports to generate"

      - name: Copy test reports and coverage
        run: |
          mkdir -p site/reports/
          if [ -d htmlcov ]; then
            cp -r htmlcov site/reports/coverage
            echo "Copied coverage reports"
          fi
          if [ -d reports ]; then
            cp -r reports site/reports/test-reports
            echo "Copied test reports"
          fi
        continue-on-error: true

      - name: Build docs
        run: mkdocs build --strict

      - name: List site contents
        run: |
          echo "=== Site Structure ==="
          find site -type f | head -30

      - name: Upload pages artifact
        uses: actions/upload-pages-artifact@latest
        with:
          path: site/

  deploy:
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@latest
