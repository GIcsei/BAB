name: Docker Build and Push (Reusable)

on:
  workflow_call:
    inputs:
      image-name:
        description: 'Docker image name'
        required: false
        default: 'bank_analysis_backend'
        type: string
      image-tag:
        description: 'Docker image tag (e.g., main, v1.0.0)'
        required: true
        type: string
      registry:
        description: 'Docker registry username (Docker Hub)'
        required: false
        default: 'icseig'
        type: string
      push:
        description: 'Push image to registry'
        required: false
        default: false
        type: boolean
      dockerfile-path:
        description: 'Path to Dockerfile'
        required: false
        default: 'docker/Dockerfile'
        type: string
      context:
        description: 'Build context directory'
        required: false
        default: '.'
        type: string
    outputs:
      image-uri:
        description: 'Full image reference (registry/image:tag)'
        value: ${{ jobs.build.outputs.image-uri }}

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      image-uri: ${{ steps.image-uri.outputs.uri }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to Docker Hub
        if: ${{ inputs.push }}
        uses: docker/login-action@v4.1.0
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ inputs.registry }}/${{ inputs.image-name }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}},value=${{ inputs.image-tag }}
            type=raw,value=${{ inputs.image-tag }}

      - name: Build and push
        uses: docker/build-push-action@v7.1.0
        with:
          context: ${{ inputs.context }}
          file: ${{ inputs.dockerfile-path }}
          push: ${{ inputs.push }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Set image URI output
        id: image-uri
        run: |
          IMAGE_URI="${{ inputs.registry }}/${{ inputs.image-name }}:${{ inputs.image-tag }}"
          echo "uri=${IMAGE_URI}" >> $GITHUB_OUTPUT
          echo "Image URI: ${IMAGE_URI}"
