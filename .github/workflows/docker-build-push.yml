name: Docker Build and Push

on:
  workflow_call:
    inputs:
      image-name:
        description: Docker image name
        required: false
        default: bank_analysis_backend
        type: string

      image-tag:
        description: Docker image tag
        required: true
        type: string

      registry:
        description: Docker registry username
        required: false
        default: icseig
        type: string

      push:
        description: Push image to registry
        required: false
        default: false
        type: boolean

      dockerfile-path:
        description: Path to Dockerfile
        required: false
        default: docker/Dockerfile
        type: string

      context:
        description: Docker build context
        required: false
        default: .
        type: string

    outputs:
      image-uri:
        description: Full image URI
        value: ${{ jobs.build.outputs.image-uri }}

jobs:
  build:
    runs-on: ubuntu-latest

    outputs:
      image-uri: ${{ steps.image-uri.outputs.uri }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to Docker Hub
        if: ${{ inputs.push }}
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ inputs.registry }}/${{ inputs.image-name }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}},value=${{ inputs.image-tag }}
            type=raw,value=${{ inputs.image-tag }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v7
        with:
          context: ${{ inputs.context }}
          file: ${{ inputs.dockerfile-path }}

          push: ${{ inputs.push }}

          pull: true

          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

          cache-from: type=gha
          cache-to: type=gha,mode=max

          provenance: false

      - name: Set image URI output
        id: image-uri
        run: |
          IMAGE_URI="${{ inputs.registry }}/${{ inputs.image-name }}:${{ inputs.image-tag }}"
          echo "uri=${IMAGE_URI}" >> $GITHUB_OUTPUT
          echo "Image URI: ${IMAGE_URI}"