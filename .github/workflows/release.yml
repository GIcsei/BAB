name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  validate:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: true
      matrix:
        python-version: ["3.12"]
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Cache uv
        uses: actions/cache@v5
        with:
          path: ~/.cache/uv
          key: ${{ runner.os }}-uv-${{ hashFiles('uv.lock') }}

      - name: Install dependencies
        env:
          UV_PROJECT_ENVIRONMENT: .venv
        run: |
          python -m pip install --upgrade pip uv
          uv sync --frozen --group dev

      - name: Extract and validate version sync
        run: |
          TAG_VERSION=${GITHUB_REF#refs/tags/v}
          PYPROJECT_VERSION=$(grep '^version' pyproject.toml | grep -oP '"\K[^"]+' || grep '^version = "' pyproject.toml | grep -oP '"\K[^"]+' )
          echo "Tag version: $TAG_VERSION"
          echo "Pyproject version: $PYPROJECT_VERSION"
          if [ "$TAG_VERSION" != "$PYPROJECT_VERSION" ]; then
            echo "ERROR: Tag version v$TAG_VERSION does not match pyproject.toml version $PYPROJECT_VERSION"
            exit 1
          fi
          echo "✓ Version sync validated: $TAG_VERSION"

      - name: Ruff
        run: uv run ruff check app tests

      - name: Black
        run: uv run black --check app tests

      - name: Mypy
        run: uv run mypy app

      - name: Pip audit
        run: uv run pip-audit

      - name: Bandit static analysis
        run: |
          mkdir -p reports
          uv run bandit -r app -ll --format json --output reports/bandit-release.json

      - name: Upload bandit report
        uses: actions/upload-artifact@v7
        with:
          name: security-scan-validate
          path: reports/bandit-release.json
          if-no-files-found: ignore

      - name: Run tests with coverage
        run: |
          mkdir -p reports
          uv run pytest -v --maxfail=1 \
            --cov=app \
            --cov-fail-under=70 \
            --cov-report=xml:coverage.xml \
            --cov-report=term-missing \
            --cov-report=html:htmlcov \
            --html=reports/pytest-report.html \
            --self-contained-html

      - name: Upload coverage report
        uses: actions/upload-artifact@v7
        with:
          name: coverage-report
          path: |
            coverage.xml
            htmlcov/

      - name: Upload test report
        uses: actions/upload-artifact@v7
        with:
          name: test-report
          path: reports/

      - name: Upload documentation
        uses: actions/upload-artifact@v7
        with:
          name: documentation
          path: docs/

  docker:
    runs-on: ubuntu-latest
    needs: [validate]
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Log in to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: icseig/bank_analysis_backend
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha
            type=raw,value=latest

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build Docker image for Trivy scan
        uses: docker/build-push-action@v7
        with:
          context: .
          file: docker/Dockerfile
          tags: bab:release-scan
          load: true
          cache-from: type=gha

      - name: Trivy image scan
        uses: aquasecurity/trivy-action@latest
        with:
          image-ref: bab:release-scan
          format: json
          output: /tmp/trivy-release.json
          exit-code: 1
          ignore-unfixed: true
          vuln-type: os,library
          severity: HIGH,CRITICAL

      - name: Upload Trivy scan report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: security-scan-release
          path: /tmp/trivy-release.json
          if-no-files-found: ignore

      - name: Build and push Docker image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: docker/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  release:
    runs-on: ubuntu-latest
    needs: [validate, docker]
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Download artifacts
        uses: actions/download-artifact@v8
        with:
          path: release-artifacts

      - name: Create GitHub release
        uses: softprops/action-gh-release@v3
        with:
          generate_release_notes: true
