name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .
          pip install pytest pytest-cov httpx black flake8 mypy bandit pip-audit

      - name: Run formatters and linters
        run: |
          black --check app tests || true
          flake8 app tests --count --show-source --statistics || true

      - name: Static type checking
        run: |
          mypy app --ignore-missing-imports --disallow-untyped-defs || true

      - name: Security audit (bandit)
        run: |
          bandit -r app -ll || true

      - name: Dependency vulnerability scan
        run: |
          pip-audit || true

      - name: Run tests with coverage
        run: |
          pytest tests/ -v --cov=app --cov-report=term-missing --cov-fail-under=60

      - name: Report coverage
        run: |
          pytest tests/ --cov=app --cov-report=xml

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v3
        with:
          files: ./coverage.xml
          flags: unittests
          name: codecov-umbrella