name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

jobs:
  lint:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: true
      matrix:
        python-version: ["3.12"]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Cache uv
        uses: actions/cache@v4
        with:
          path: ~/.cache/uv
          key: ${{ runner.os }}-uv-${{ hashFiles('uv.lock') }}

      - name: Install dependencies
        env:
          UV_PROJECT_ENVIRONMENT: .venv
        run: |
          python -m pip install --upgrade pip uv
          uv sync --frozen --group dev

      - name: Ruff
        run: uv run ruff check app tests

      - name: Black
        run: uv run black --check app tests

  typecheck:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: true
      matrix:
        python-version: ["3.12"]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Cache uv
        uses: actions/cache@v4
        with:
          path: ~/.cache/uv
          key: ${{ runner.os }}-uv-${{ hashFiles('uv.lock') }}

      - name: Install dependencies
        env:
          UV_PROJECT_ENVIRONMENT: .venv
        run: |
          python -m pip install --upgrade pip uv
          uv sync --frozen --group dev

      - name: Mypy
        run: uv run mypy app

  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: true
      matrix:
        python-version: ["3.12"]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Cache uv
        uses: actions/cache@v4
        with:
          path: ~/.cache/uv
          key: ${{ runner.os }}-uv-${{ hashFiles('uv.lock') }}

      - name: Install dependencies
        env:
          UV_PROJECT_ENVIRONMENT: .venv
        run: |
          python -m pip install --upgrade pip uv
          uv sync --frozen --group dev

      - name: Run tests with coverage
        run: |
          mkdir -p reports
          uv run pytest -v --maxfail=1 \
            --cov=app \
            --cov-fail-under=70 \
            --cov-report=xml:coverage.xml \
            --cov-report=term-missing \
            --cov-report=html:htmlcov \
            --html=reports/pytest-report.html \
            --self-contained-html

      - name: Upload reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: |
            reports/
            coverage.xml
            htmlcov/

      - name: Upload documentation
        uses: actions/upload-artifact@v4
        with:
          name: documentation
          path: docs/

  security:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: true
      matrix:
        python-version: ["3.12"]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Cache uv
        uses: actions/cache@v4
        with:
          path: ~/.cache/uv
          key: ${{ runner.os }}-uv-${{ hashFiles('uv.lock') }}

      - name: Install dependencies
        env:
          UV_PROJECT_ENVIRONMENT: .venv
        run: |
          python -m pip install --upgrade pip uv
          uv sync --frozen --group dev

      - name: Pip audit
        run: uv run pip-audit

      - name: Bandit static analysis
        run: |
          uv run bandit -r app \
            -ll \
            -f json \
            -o bandit-report.json || true
          uv run bandit -r app -ll

      - name: Upload Bandit report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bandit-report
          path: bandit-report.json

  build:
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    needs: [lint, typecheck, test, security]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/Dockerfile
          tags: bab:ci
          load: true
          cache-from: type=gha
          cache-to: type=gha,mode=max

  notify:
    runs-on: ubuntu-latest
    if: failure() && github.event_name == 'pull_request'
    needs: [lint, typecheck, test, security]
    permissions:
      pull-requests: write
    steps:
      - name: Comment on PR about failure
        uses: actions/github-script@v7
        with:
          script: |
            const runUrl = `https://github.com/${context.repo.owner}` +
              `/${context.repo.repo}/actions/runs/${context.runId}`;
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: [
                '## \u274c CI Failed',
                '',
                'One or more CI jobs failed on this pull request.' +
                  ` Please review the [workflow run](${runUrl}) for details.`,
                '',
                '**Jobs**: lint \u00b7 typecheck \u00b7 test \u00b7 security',
              ].join('\n'),
            });
