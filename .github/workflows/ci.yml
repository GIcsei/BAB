name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  lint-test-build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: 3.12

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-3.12-${{ hashFiles('**/pyproject.toml') }}
          restore-keys: |
            ${{ runner.os }}-pip-3.12-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .
          pip install pytest pytest-cov pytest-html black flake8 mypy

      ############################################################
      # BLACK + FLAKE8 WITH SUMMARY
      ############################################################

      - name: Run Black & Flake8
        id: lint
        run: |
          mkdir -p reports

          echo "# 🔍 Lint & Formatting Report" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          echo "## Black" >> $GITHUB_STEP_SUMMARY

          if black --check --diff app tests > reports/black.txt 2>&1; then
            echo "✅ Black passed" >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ Black failed" >> $GITHUB_STEP_SUMMARY
            echo "<details><summary>Black diff</summary>" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo '```diff' >> $GITHUB_STEP_SUMMARY
            cat reports/black.txt >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            echo "</details>" >> $GITHUB_STEP_SUMMARY
            exit 1
          fi

          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## Flake8" >> $GITHUB_STEP_SUMMARY

          if flake8 --extend-ignore="E203, E501, E402" app tests --count --show-source --statistics > reports/flake8.txt 2>&1; then
            echo "✅ Flake8 passed" >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ Flake8 failed" >> $GITHUB_STEP_SUMMARY
            echo "<details><summary>Flake8 output</summary>" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            cat reports/flake8.txt >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            echo "</details>" >> $GITHUB_STEP_SUMMARY
            exit 1
          fi

      ############################################################
      # TESTS + COVERAGE
      ############################################################

      - name: Run tests with coverage
        run: |
          pytest -v --maxfail=1 \
            --cov=app \
            --cov-report=xml:coverage.xml \
            --cov-report=term-missing \
            --cov-report=html:htmlcov \
            --html=reports/pytest-report.html \
            --self-contained-html

      - name: Coverage Summary
        if: always()
        run: |
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "# 📊 Test & Coverage Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          python << 'PY'
          import os
          import xml.etree.ElementTree as ET

          cov_file = "coverage.xml"
          summary_path = os.environ.get("GITHUB_STEP_SUMMARY")

          cov_pct = "n/a"
          if os.path.exists(cov_file):
              root = ET.parse(cov_file).getroot()
              line_rate = root.attrib.get("line-rate")
              if line_rate:
                  cov_pct = f"{float(line_rate) * 100:.2f}%"

          with open(summary_path, "a") as f:
              f.write(f"- Line coverage: **{cov_pct}**\n")
          PY

      ############################################################
      # UPLOAD ARTIFACTS
      ############################################################

      - name: Upload reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: |
            reports/
            coverage.xml
            htmlcov/

      ############################################################
      # DEPLOY COVERAGE REPORT TO GITHUB PAGES
      ############################################################

      - name: Prepare Pages content
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          mkdir -p public
          cp -r htmlcov/* public/
          cp reports/pytest-report.html public/

      - name: Deploy to GitHub Pages
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./public