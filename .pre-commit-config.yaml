repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.4
    hooks:
    # Run the linter.
      - id: ruff-check
        types_or: [ python, pyi ]
        args: [ --fix ]
    # Run the formatter.
      - id: ruff-format
        types_or: [ python, pyi ]

  - repo: https://github.com/psf/black
    rev: 26.1.0
    hooks:
      - id: black