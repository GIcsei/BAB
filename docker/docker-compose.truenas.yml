services:
  app:
    image: icseig/bank_analysis_backend:latest
    container_name: bank_analysis_backend

    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --workers 1

    restart: always
    ports:
      - "${APP_PORT:-6767}:8000"

    environment:
      APP_USER_DATA_DIR: /var/app/user_data
      LOCAL_DOWNLOADS_DIR: /var/app/downloads
      SELENIUM_DOWNLOADS_DIR: ${SELENIUM_DOWNLOADS_DIR:-/home/seluser/Downloads}

      APP_JOB_HOUR: "${APP_JOB_HOUR:-17}"
      APP_JOB_MINUTE: "${APP_JOB_MINUTE:-0}"
      LOG_LEVEL: "${LOG_LEVEL:-INFO}"
      LOG_FILE: "/var/app/app.log"
      LOG_JSON: "${LOG_JSON:-false}"

      PUID: "${PUID:-568}"
      PGID: "${PGID:-568}"

      FIRESTORE_CREDENTIALS: "/run/secrets/firestore_credentials"
      SELENIUM_REMOTE_URL: "http://selenium:4444"

    volumes:
      - ${APP_USER_DATA_HOST_PATH:-/mnt/cloud/BAB_store/user_data}:/var/app/user_data
      - ${APP_DOWNLOADS_HOST_PATH:-/mnt/cloud/BAB_store/downloads}:/var/app/downloads
    secrets:
      - firestore_credentials
    depends_on:
      selenium:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8000/health || exit 1"]
      interval: 30s
      timeout: 5s
      start_period: 30s
      retries: 3
    networks:
      - bank_analysis_network
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: '512M'

  selenium:
    image: selenium/standalone-edge:144.0-20260202
    container_name: bank-analysis-selenium
    restart: always
    shm_size: "2g"
    volumes:
      # Must match selenium's internal download dir (default /home/seluser/Downloads)
      - ${APP_DOWNLOADS_HOST_PATH:-/mnt/cloud/BAB_store/downloads}:${SELENIUM_DOWNLOADS_DIR:-/home/seluser/Downloads}
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:4444/status || exit 1"]
      interval: 15s
      timeout: 5s
      start_period: 30s
      retries: 5
    networks:
      - bank_analysis_network
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: '3G'

networks:
  bank_analysis_network:
    driver: bridge

secrets:
  firestore_credentials:
    file: ${FIRESTORE_MASTER_KEY:-/mnt/cloud/BAB_store/master.json}
