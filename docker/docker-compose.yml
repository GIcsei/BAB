services:
  app:
    image: bank_analysis_backend:latest
    build:
      context: ..
      dockerfile: docker/Dockerfile
    restart: unless-stopped
    ports:
      - "${APP_PORT:-8000}:8000"
    env_file:
      - ../.env
    environment:
      APP_USER_DATA_DIR: ${APP_USER_DATA_DIR:-/var/app/user_data}
      LOCAL_DOWNLOADS_DIR: ${LOCAL_DOWNLOADS_DIR:-/var/app/downloads}
      SELENIUM_DOWNLOADS_DIR: ${SELENIUM_DOWNLOADS_DIR:-/downloads}
      APP_JOB_HOUR: "${APP_JOB_HOUR:-18}"
      APP_JOB_MINUTE: "${APP_JOB_MINUTE:-0}"
      LOG_LEVEL: "${LOG_LEVEL:-INFO}"
      PUID: "${PUID:-568}"
      PGID: "${PGID:-568}"
      GOOGLE_APPLICATION_CREDENTIALS: "${APP_GOOGLE_APPLICATION_CREDENTIALS:-/var/app/credentials.json}"
      SELENIUM_REMOTE_URL: "http://selenium:4444"
    depends_on:
      selenium:
        condition: service_healthy
    volumes:
      - ${APP_USER_DATA_HOST_PATH}:${APP_USER_DATA_DIR:-/var/app/user_data}
      - ${APP_DOWNLOADS_HOST_PATH}:${LOCAL_DOWNLOADS_DIR:-/var/app/downloads}
      - ${FIRESTORE_MASTER_KEY}:${APP_GOOGLE_APPLICATION_CREDENTIALS:-/var/app/credentials.json}:ro
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8000/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3

  selenium:
    image: selenium/standalone-edge:144.0-20260202
    restart: unless-stopped
    shm_size: "2g"
    ports:
      - "4444:4444"
    volumes:
      - ${APP_DOWNLOADS_HOST_PATH}:${SELENIUM_DOWNLOADS_DIR}
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:4444/status || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5