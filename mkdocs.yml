site_name: Bank Analysis Backend
site_description: FastAPI backend for authenticated data ingestion, processing, and visualization.
site_url: https://gicsei.github.io/BAB/
repo_url: https://github.com/GIcsei/BAB
repo_name: GIcsei/BAB
edit_uri: edit/main/docs/

theme:
  name: material
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy

nav:
  - Home: index.md
  - Architecture: architecture.md
  - API Reference: api.md
  - Setup: setup.md
  - Deployment: deployment.md
  - Testing: testing.md
  - Security: security.md

plugins:
  - search

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - tables
  - toc:
      permalink: true
